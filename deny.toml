# cargo-deny configuration — run `cargo deny check` in CI
[advisories]
vulnerability = "deny"
unmaintained = "warn"
notice = "warn"
ignore = []

[licenses]
unlicensed = "deny"
allow = ["MIT", "Apache-2.0", "ISC"]
deny = []
copyleft = "deny"

[bans]
multiple-versions = "deny"
wildcards = "deny"
highlight = "all"
